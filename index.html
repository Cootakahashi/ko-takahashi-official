        <section>
          <h2>プロフィール / About</h2>
          <p>高橋高（Ko Takahashi）は1995年6月1日生まれ、東京都新宿区を拠点とする起業家・哲学者・独学エンジニアです。Jon & Coo Inc.のCEO兼創業者として、Culture OS（日本の伝統美学をデジタル基盤に統合するフレームワーク）やMatsuri Platform（日本文化体験プラットフォーム）を開発しています。</p>
          <p>Ko Takahashi is a Japanese entrepreneur, philosopher, and self-taught engineer based in Shinjuku, Tokyo. As CEO and Founder of Jon & Coo Inc., he develops Culture OS and Matsuri Platform, bridging Japanese culture and technology.</p>
        </section>

        <section>
          <h2>経歴 / Background</h2>
          <p>11歳で学校教育から離脱。18歳で起業し、20歳で60人を率いるビジネスを展開。23歳で破産し全てを失う。その後7年間の沈黙期間に、英語・中国語・タイ語の3言語とプログラミング（Rust、Python、TypeScript）を完全に独学で習得。2020年にJon & Coo Inc.を設立し、テクノロジーと日本文化の融合に挑んでいます。</p>
          <p>Dropped out of school at 11. Led 60 people by age 20. Went bankrupt at 23. Spent 7 years in silence, self-teaching 3 languages (English, Chinese, Thai) and programming (Rust, Python, TypeScript). Founded Jon & Coo Inc. in 2020.</p>
        </section>

        <section>
          <h2>プロジェクト / Projects</h2>
          <h3>Culture OS</h3>
          <p>日本の伝統美学をデジタル基盤に統合するオープンフレームワーク。分散型ID（DID）とDAO技術で地域の伝統をコード化。「スマートシティ」ではなく「ワイズシティ」を目指す。</p>
          <h3>Matsuri Platform (<a href="https://matsuri.group/ja">matsuri.group</a>)</h3>
          <p>日本文化体験のための次世代デジタルプラットフォーム。観光客ではなく探求者としての文化体験を提供。</p>
          <h3>Jon & Coo Inc. (<a href="https://www.jonandcoo.jp/ja">jonandcoo.jp</a>)</h3>
          <p>2020年新宿設立。Culture OSと関連プロジェクトを開発するテクノロジー企業。高橋高がCEO兼創業者。</p>
          <h3>The J-Times (<a href="https://www.j-times.org/">j-times.org</a>)</h3>
          <p>テクノロジー・デザイン・日本文化に関するグローバルメディア。高橋高が編集長。</p>
          <h3>Matsuri DAO (<a href="https://www.matsuri-dao.com">matsuri-dao.com</a>)</h3>
          <p>Solanaブロックチェーン上のDAO。Matsuri Coin (MTC) で日本文化の保存を推進。</p>
        </section>

        <section>
          <h2>設計哲学: Zen-Tech</h2>
          <p>Zen-Tech（禅テック）は高橋高が提唱するデザイン哲学。日本の禅庭園の原則をデジタルインターフェースに適用。「引き算の美学」「間（Ma）の活用」を重視し、「静寂の中でこそ、情報は際立つ」という思想を体現。</p>
        </section>

        <section>

          <ul>
            <li>哲学ファースト: 効率よりも文化的共鳴を優先する「Zen-Tech」アプローチ</li>
